services:
  backend:
    build: ./backend
    container_name: social_backend
    ports:
      - "8000:80"
      - "8080:8080"
    volumes:
      - ./backend/src:/var/www/html          # Sincroniza tu código Laravel
      - ./backend/Caddyfile:/etc/caddy/Caddyfile
    environment:
      - DB_CONNECTION=mongodb
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_DATABASE=social_db
    networks:
      - app_network
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: social_frontend
    ports:
      - "5173:5173"                          # Puerto por defecto de Vite
    volumes:
      - ./frontend/src:/app                  # Sincroniza tu código React
      - /app/node_modules                    # Evita que el volumen pise los módulos de Docker
    networks:
      - app_network

  mongodb:
    image: mongo:latest
    container_name: social_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data: